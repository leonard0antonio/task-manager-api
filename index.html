<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Teste Visual</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-3xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <h1 class="text-2xl font-bold text-indigo-600 mb-2">🚀 Simulador do Task Manager</h1>
            <p class="text-sm text-slate-500 mb-4">Esta interface se conecta diretamente com a sua API Node.js.</p>
            
            <label class="block text-sm font-medium text-slate-700">Onde sua API está rodando?</label>
            <input type="text" id="apiUrl" value="http://localhost:3000/api" 
                   class="mt-1 w-full p-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                   placeholder="Ex: https://sua-api.onrender.com/api">
        </div>

        <div id="authScreen" class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 transition-all">
            <h2 class="text-lg font-semibold mb-4">1. Identificação (Register / Login)</h2>
            <div class="space-y-3">
                <input type="text" id="name" placeholder="Seu Nome (Apenas para registro)" class="w-full p-2 border rounded-md hidden">
                <input type="email" id="email" placeholder="E-mail" class="w-full p-2 border rounded-md" value="teste@teste.com">
                <input type="password" id="password" placeholder="Senha" class="w-full p-2 border rounded-md" value="123456">
                
                <div class="flex gap-3 pt-2">
                    <button onclick="login()" class="flex-1 bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition">Entrar</button>
                    <button onclick="toggleRegister()" id="btnToggleRegister" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded-md hover:bg-slate-300 transition">Criar Conta Nova</button>
                    <button onclick="register()" id="btnRegisterSubmit" class="flex-1 bg-emerald-600 text-white py-2 rounded-md hover:bg-emerald-700 transition hidden">Confirmar Registro</button>
                </div>
                <p id="authMessage" class="text-sm font-medium mt-2 text-center"></p>
            </div>
        </div>

        <div id="catalogoScreen" class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hidden opacity-0 transition-opacity duration-500">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-semibold">2. Catálogo de Tarefas</h2>
                    <p class="text-sm text-slate-500">Conectado com sucesso. Token JWT armazenado.</p>
                </div>
                <button onclick="loadTasks()" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-md hover:bg-indigo-200 font-medium transition">
                    🔄 Atualizar Lista
                </button>
            </div>

            <div id="tasksList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-full text-center text-slate-400 py-8 border-2 border-dashed rounded-lg">
                    Clique em atualizar para buscar as tarefas no banco de dados.
                </div>
            </div>
        </div>

    </div>

    <script>
        let jwtToken = '';
        let isRegistering = false;

        // Alternar visualização entre Login e Register
        function toggleRegister() {
            isRegistering = !isRegistering;
            document.getElementById('name').classList.toggle('hidden');
            document.getElementById('btnToggleRegister').classList.toggle('hidden');
            document.getElementById('btnRegisterSubmit').classList.toggle('hidden');
        }

        function showMessage(elementId, text, isError = false) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = `text-sm font-medium mt-2 text-center ${isError ? 'text-red-500' : 'text-emerald-500'}`;
        }

        // Fluxo de criar conta
        async function register() {
            const url = document.getElementById('apiUrl').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Evitando o comportamento de recarregar a tela (como se fosse um documento) usando a API Fetch pura
                const response = await fetch(`${url}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role: 'admin' })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Erro ao registrar');
                
                showMessage('authMessage', 'Conta criada! Agora clique em Entrar para gerar o Token.');
                toggleRegister(); // Volta para a tela de login
            } catch (error) {
                showMessage('authMessage', error.message, true);
            }
        }

        // Fluxo de Autenticação
        async function login() {
            const url = document.getElementById('apiUrl').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${url}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Credenciais inválidas');

                jwtToken = data.token; // Salva o crachá!
                
                // Transição da Tela Register/Login para a Tela Catálogo
                document.getElementById('authScreen').classList.add('hidden');
                const catalogo = document.getElementById('catalogoScreen');
                catalogo.classList.remove('hidden');
                setTimeout(() => catalogo.classList.remove('opacity-0'), 50); // Efeito fade-in suave
                
                loadTasks(); // Carrega as tarefas automaticamente
            } catch (error) {
                showMessage('authMessage', error.message, true);
            }
        }

        // Fluxo do Catálogo (Listando Tarefas)
        async function loadTasks() {
            const url = document.getElementById('apiUrl').value;
            const tasksListEl = document.getElementById('tasksList');

            try {
                const response = await fetch(`${url}/tasks`, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${jwtToken}`, // Mostrando o crachá para a API
                        'Content-Type': 'application/json' 
                    }
                });

                if (!response.ok) throw new Error('Erro ao buscar tarefas');
                
                const tasks = await response.json();
                tasksListEl.innerHTML = ''; // Limpa a lista

                if (tasks.length === 0) {
                    tasksListEl.innerHTML = `<div class="col-span-full text-center text-slate-400 py-8 border-2 border-dashed rounded-lg">Nenhuma tarefa encontrada. Crie uma via Insomnia!</div>`;
                    return;
                }

                // Desenha os cards na tela
                tasks.forEach(task => {
                    const statusColors = {
                        pending: 'bg-yellow-100 text-yellow-800',
                        in_progress: 'bg-blue-100 text-blue-800',
                        completed: 'bg-green-100 text-green-800'
                    };

                    const card = `
                        <div class="p-4 border border-slate-200 rounded-lg shadow-sm hover:shadow-md transition">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-slate-800">${task.title}</h3>
                                <span class="text-xs px-2 py-1 rounded-full font-medium ${statusColors[task.status] || 'bg-slate-100'}">${task.status}</span>
                            </div>
                            <p class="text-sm text-slate-600 mb-3">${task.description || 'Sem descrição'}</p>
                            <div class="text-xs text-slate-400 flex justify-between">
                                <span>Prioridade: <b class="uppercase">${task.priority}</b></span>
                                <span>Time ID: ${task.team_id}</span>
                            </div>
                        </div>
                    `;
                    tasksListEl.innerHTML += card;
                });

            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>
</html>
