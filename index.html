<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Simulador Visual</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <h1 class="text-2xl font-bold text-indigo-600 mb-2">🚀 Simulador do Task Manager</h1>
            <p class="text-sm text-slate-500 mb-4">Certifique-se de que a URL termina com <b>/api</b>.</p>
            
            <label class="block text-sm font-medium text-slate-700">Onde sua API está rodando?</label>
            <input type="text" id="apiUrl" value="http://localhost:3000/api" 
                   class="mt-1 w-full p-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div id="authScreen" class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 transition-all">
            <h2 class="text-lg font-semibold mb-4">1. Identificação (Register / Login)</h2>
            <div class="space-y-3">
                <input type="text" id="name" placeholder="Seu Nome" class="w-full p-2 border rounded-md hidden">
                <input type="email" id="email" placeholder="E-mail" class="w-full p-2 border rounded-md" value="admin@teste.com">
                <input type="password" id="password" placeholder="Senha" class="w-full p-2 border rounded-md" value="123456">
                
                <div class="flex gap-3 pt-2">
                    <button onclick="login()" class="flex-1 bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition">Entrar</button>
                    <button onclick="toggleRegister()" id="btnToggleRegister" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded-md hover:bg-slate-300 transition">Criar Conta</button>
                    <button onclick="register()" id="btnRegisterSubmit" class="flex-1 bg-emerald-600 text-white py-2 rounded-md hover:bg-emerald-700 transition hidden">Confirmar Registro (Admin)</button>
                </div>
                <p id="authMessage" class="text-sm font-medium mt-2 text-center"></p>
            </div>
        </div>

        <div id="adminScreen" class="bg-indigo-50 p-6 rounded-xl shadow-sm border border-indigo-100 hidden opacity-0 transition-opacity duration-500">
            <h2 class="text-xl font-bold text-indigo-800 mb-4">👑 Painel do Administrador</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                    <h3 class="font-semibold text-slate-700 mb-2">Criar Novo Time</h3>
                    <input type="text" id="teamName" placeholder="Nome do Time (ex: Squad Backend)" class="w-full p-2 border rounded-md mb-2 text-sm">
                    <button onclick="createTeam()" class="w-full bg-indigo-600 text-white py-2 rounded-md text-sm font-medium hover:bg-indigo-700">Criar Time</button>
                    <p id="teamMsg" class="text-xs font-medium mt-2 text-center"></p>
                </div>

                <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                    <h3 class="font-semibold text-slate-700 mb-2">Vincular Usuário ao Time</h3>
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="teamIdMember" placeholder="ID do Time" class="w-full p-2 border rounded-md text-sm">
                        <input type="number" id="userIdMember" placeholder="ID do Usuário" class="w-full p-2 border rounded-md text-sm">
                    </div>
                    <button onclick="addMember()" class="w-full bg-indigo-600 text-white py-2 rounded-md text-sm font-medium hover:bg-indigo-700">Vincular</button>
                    <p id="memberMsg" class="text-xs font-medium mt-2 text-center"></p>
                </div>

                <div class="col-span-full bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                    <h3 class="font-semibold text-slate-700 mb-2">Criar e Atribuir Tarefa</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2">
                        <input type="text" id="taskTitle" placeholder="Título da Tarefa" class="col-span-2 p-2 border rounded-md text-sm">
                        <select id="taskPriority" class="p-2 border rounded-md text-sm">
                            <option value="high">Alta Prioridade</option>
                            <option value="medium">Média Prioridade</option>
                            <option value="low">Baixa Prioridade</option>
                        </select>
                        <input type="number" id="taskTeamId" placeholder="ID do Time" class="p-2 border rounded-md text-sm">
                        <input type="number" id="taskAssignee" placeholder="ID do Usuário (Opcional)" class="p-2 border rounded-md text-sm">
                    </div>
                    <button onclick="createAndAssignTask()" class="w-full bg-emerald-600 text-white py-2 rounded-md text-sm font-medium hover:bg-emerald-700">Cadastrar Tarefa</button>
                    <p id="assignMsg" class="text-xs font-medium mt-2 text-center"></p>
                </div>

            </div>
        </div>

        <div id="catalogoScreen" class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hidden opacity-0 transition-opacity duration-500">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-semibold">📋 Visão Geral das Tarefas</h2>
                </div>
                <button onclick="loadTasks()" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-md hover:bg-slate-200 font-medium transition">
                    🔄 Atualizar Lista
                </button>
            </div>

            <div id="tasksList" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="col-span-full text-center text-slate-400 py-8 border-2 border-dashed rounded-lg">
                    Clique em atualizar para buscar as tarefas.
                </div>
            </div>
        </div>

    </div>

    <script>
        let jwtToken = '';
        let currentUser = null;
        let isRegistering = false;

        function toggleRegister() {
            isRegistering = !isRegistering;
            document.getElementById('name').classList.toggle('hidden');
            document.getElementById('btnToggleRegister').classList.toggle('hidden');
            document.getElementById('btnRegisterSubmit').classList.toggle('hidden');
        }

        function showMessage(elementId, text, isError = false) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = `text-xs font-bold mt-2 text-center ${isError ? 'text-red-500' : 'text-emerald-500'}`;
            setTimeout(() => el.textContent = '', 4000); // Apaga a mensagem depois de 4s
        }

        // --- AUTH ---
        async function register() {
            const url = document.getElementById('apiUrl').value;
            try {
                const response = await fetch(`${url}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        role: 'admin' // Forçando admin para você conseguir testar o painel
                    })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                showMessage('authMessage', `Conta criada com sucesso! ID: ${data.id}. Clique em entrar.`);
                toggleRegister();
            } catch (error) {
                showMessage('authMessage', error.message, true);
            }
        }

        async function login() {
            const url = document.getElementById('apiUrl').value;
            try {
                const response = await fetch(`${url}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                jwtToken = data.token;
                currentUser = data.user;
                
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('catalogoScreen').classList.remove('hidden');
                setTimeout(() => document.getElementById('catalogoScreen').classList.remove('opacity-0'), 50);
                
                // Se for admin, exibe o painel novo!
                if(currentUser.role === 'admin') {
                    document.getElementById('adminScreen').classList.remove('hidden');
                    setTimeout(() => document.getElementById('adminScreen').classList.remove('opacity-0'), 50);
                }

                loadTasks();
            } catch (error) {
                showMessage('authMessage', error.message, true);
            }
        }

        // --- ADMIN ENDPOINTS ---
        async function createTeam() {
            const url = document.getElementById('apiUrl').value;
            try {
                const response = await fetch(`${url}/teams`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwtToken}` },
                    body: JSON.stringify({ name: document.getElementById('teamName').value })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                showMessage('teamMsg', `Time criado! Guarde o ID: ${data.id}`);
            } catch (error) { showMessage('teamMsg', error.message, true); }
        }

        async function addMember() {
            const url = document.getElementById('apiUrl').value;
            const teamId = document.getElementById('teamIdMember').value;
            try {
                const response = await fetch(`${url}/teams/${teamId}/members`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwtToken}` },
                    body: JSON.stringify({ user_id: Number(document.getElementById('userIdMember').value) })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                showMessage('memberMsg', `Usuário vinculado com sucesso!`);
            } catch (error) { showMessage('memberMsg', error.message, true); }
        }

        async function createAndAssignTask() {
            const url = document.getElementById('apiUrl').value;
            const assignee = document.getElementById('taskAssignee').value;
            const bodyData = {
                title: document.getElementById('taskTitle').value,
                priority: document.getElementById('taskPriority').value,
                team_id: Number(document.getElementById('taskTeamId').value)
            };
            if(assignee) bodyData.assigned_to = Number(assignee); // Só envia se preencheu

            try {
                const response = await fetch(`${url}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwtToken}` },
                    body: JSON.stringify(bodyData)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                showMessage('assignMsg', `Tarefa ID ${data.id} criada! Atualize a lista abaixo.`);
                loadTasks(); // Atualiza o grid automaticamente
            } catch (error) { showMessage('assignMsg', error.message, true); }
        }

        // --- CATÁLOGO ---
        async function loadTasks() {
            const url = document.getElementById('apiUrl').value;
            const tasksListEl = document.getElementById('tasksList');
            try {
                const response = await fetch(`${url}/tasks`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });
                if (!response.ok) throw new Error('Erro ao buscar tarefas');
                const tasks = await response.json();
                tasksListEl.innerHTML = '';

                if (tasks.length === 0) {
                    tasksListEl.innerHTML = `<div class="col-span-full text-center text-slate-400 py-8 border-2 border-dashed rounded-lg">Nenhuma tarefa encontrada.</div>`;
                    return;
                }

                tasks.forEach(task => {
                    const statusColors = { pending: 'bg-yellow-100 text-yellow-800', in_progress: 'bg-blue-100 text-blue-800', completed: 'bg-green-100 text-green-800'};
                    // Se tiver atribuído (assignee), mostra o nome da pessoa
                    const assignText = task.assignee ? `👤 ${task.assignee.name}` : `👤 Não atribuída`;
                    const teamText = task.team ? `🏢 ${task.team.name}` : `Team ID: ${task.team_id}`;

                    const card = `
                        <div class="p-4 border border-slate-200 rounded-lg shadow-sm bg-white">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-slate-800">${task.title}</h3>
                                <span class="text-[10px] px-2 py-1 rounded-full font-bold uppercase ${statusColors[task.status] || 'bg-slate-100'}">${task.status}</span>
                            </div>
                            <div class="text-xs text-slate-500 flex flex-col gap-1 mt-4 border-t pt-2 border-slate-100">
                                <span>${teamText}</span>
                                <span class="font-medium text-indigo-600">${assignText}</span>
                                <span>Prioridade: <b class="uppercase">${task.priority}</b></span>
                            </div>
                        </div>
                    `;
                    tasksListEl.innerHTML += card;
                });
            } catch (error) { alert(error.message); }
        }
    </script>
</body>
</html>
